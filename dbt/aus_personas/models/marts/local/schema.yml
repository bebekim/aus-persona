version: 2

models:
  - name: dim_willoughby_sa2_overlap
    description: >
      One row represents one SA2 whose 2021 boundary intersects the 2021
      Willoughby LGA boundary. Percent fields describe how much of the SA2 is
      inside Willoughby and how much of Willoughby is covered by that SA2.
    columns:
      - name: lga_code
        data_tests:
          - not_null
      - name: council_name
        data_tests:
          - not_null
      - name: sa2_code
        data_tests:
          - not_null
          - unique
      - name: pct_sa2_in_lga
        data_tests:
          - not_null
      - name: pct_lga_from_sa2
        data_tests:
          - not_null
      - name: overlap_role
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["core", "edge"]

  - name: mart_willoughby_g01_profile
    description: >
      One row represents one Willoughby City Council x G01 semantic topic x
      category x sex estimate, derived from interpreted SA2 G01 models and
      area-overlap weighting. This is a local hackathon profile, not a raw ABS
      delivery table.
    columns:
      - name: council_name
        data_tests:
          - not_null
      - name: topic
        data_tests:
          - not_null
      - name: category
        data_tests:
          - not_null
      - name: sex
        data_tests:
          - not_null
      - name: estimated_count
        data_tests:
          - not_null
      - name: contributing_sa2_count
        data_tests:
          - not_null
