version: 2

models:
  - name: int_g01__column_profile
    description: >
      One row represents one raw G01 measure column profiled across all SA2s.
      G01 is a wide ABS summary table, so this model makes the raw columns
      inspectable before they are split into semantic long models.
    columns:
      - name: physical_table
        data_tests:
          - not_null
      - name: raw_column
        data_tests:
          - not_null
          - unique
      - name: g01_section
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - total_persons_by_sex
                  - age_group_by_sex
                  - census_night_location_by_sex
                  - indigenous_summary_by_sex
                  - birthplace_summary_by_sex
                  - language_summary_by_sex
                  - citizenship_by_sex
                  - education_attendance_by_sex
                  - school_completion_by_sex
                  - dwelling_residence_summary_by_sex
      - name: sa2_count
        data_tests:
          - not_null

  - name: int_g01__total_persons_by_sex
    description: One row represents one SA2 x sex total-person count from G01.
    columns:
      - name: sa2_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_abs__sa2_geography')
                field: sa2_code
      - name: sex
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Male", "Female", "Persons"]
      - name: count
        data_tests:
          - not_null

  - name: int_g01__age_group_by_sex
    description: One row represents one SA2 x G01 age group x sex count.
    columns:
      - name: sa2_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_abs__sa2_geography')
                field: sa2_code
      - name: age_band
        data_tests:
          - not_null
      - name: sex
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Male", "Female", "Persons"]
      - name: count
        data_tests:
          - not_null

  - name: int_g01__birthplace_summary_by_sex
    description: One row represents one SA2 x birthplace summary x sex count.
    columns:
      - name: sa2_code
        data_tests:
          - not_null
      - name: birthplace_summary
        data_tests:
          - not_null
      - name: sex
        data_tests:
          - not_null
      - name: count
        data_tests:
          - not_null

  - name: int_g01__language_summary_by_sex
    description: One row represents one SA2 x language summary x sex count.
    columns:
      - name: sa2_code
        data_tests:
          - not_null
      - name: language_summary
        data_tests:
          - not_null
      - name: sex
        data_tests:
          - not_null
      - name: count
        data_tests:
          - not_null

  - name: int_g01__school_completion_by_sex
    description: One row represents one SA2 x highest school completion summary x sex count.
    columns:
      - name: sa2_code
        data_tests:
          - not_null
      - name: school_completion
        data_tests:
          - not_null
      - name: sex
        data_tests:
          - not_null
      - name: count
        data_tests:
          - not_null
