version: 2

seeds:
  - name: willoughby_political_sources
    description: >
      Source registry for the Willoughby local political memory layer. Each row
      records an authoritative source family that can be harvested into
      election, meeting, notice-of-motion, or planning-determination facts.
    config:
      tags: ["local", "willoughby", "political_memory"]
    columns:
      - name: source_id
        data_tests:
          - not_null
          - unique
      - name: council_slug
        data_tests:
          - not_null
      - name: source_family
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - election_results
                  - meeting_votes
                  - notices_of_motion
                  - planning_determinations
      - name: primary_url
        data_tests:
          - not_null
      - name: authority
        data_tests:
          - not_null

  - name: willoughby_political_event_contracts
    description: >
      Grain and key contracts for normalized Willoughby political memory facts.
      These contracts keep sourced civic records separate from generated
      persona prose.
    config:
      tags: ["local", "willoughby", "political_memory"]
    columns:
      - name: contract_id
        data_tests:
          - not_null
          - unique
      - name: event_family
        data_tests:
          - not_null
      - name: one_row_represents
        data_tests:
          - not_null
      - name: natural_key
        data_tests:
          - not_null
      - name: required_fields
        data_tests:
          - not_null

  - name: willoughby_2024_candidate_vote_rows
    description: >
      Harvested NSW Electoral Commission first-preference vote rows for the
      2024 Willoughby mayoral and ward councillor contests. Councillor contests
      include both above-the-line group vote rows and named candidate vote rows
      because the official proportional representation report separates them.
    config:
      tags: ["local", "willoughby", "political_memory", "election_results"]
    columns:
      - name: result_id
        data_tests:
          - not_null
          - unique
      - name: council_slug
        data_tests:
          - not_null
      - name: election_year
        data_tests:
          - not_null
      - name: contest_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["mayoral", "councillor"]
      - name: ballot_line_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["candidate", "above_the_line"]
      - name: first_preference_votes
        data_tests:
          - not_null
      - name: total_formal_votes
        data_tests:
          - not_null
      - name: source_url
        data_tests:
          - not_null

  - name: willoughby_2025_council_motion_vote_outcomes
    description: >
      Harvested Willoughby City Council CivicClerk motion-vote outcome rows for
      the 15 September 2025 Ordinary Council Meeting. Rows represent recorded
      motion outcomes, not resident votes; en bloc resolutions are preserved as
      carried outcomes without named councillor vote lists.
    config:
      tags: ["local", "willoughby", "political_memory", "meeting_votes"]
    columns:
      - name: vote_outcome_id
        data_tests:
          - not_null
          - unique
      - name: council_slug
        data_tests:
          - not_null
      - name: meeting_date
        data_tests:
          - not_null
      - name: civicclerk_event_id
        data_tests:
          - not_null
      - name: agenda_object_item_id
        data_tests:
          - not_null
      - name: action_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Motion
                  - Resolution En Bloc
                  - Procedural Motion
                  - Amendment
      - name: vote_result
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Carried
                  - Lost
      - name: named_vote_available
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "true"
                  - "false"
      - name: source_url
        data_tests:
          - not_null
